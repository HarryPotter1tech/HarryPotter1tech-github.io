<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {% endif %}操作系统导论</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
</head>
<body>
  <div class="wrapper">
    {% include sidebar.html %}
    <div class="main">
      <header class="topbar">
        <button class="hamburger" id="sidebarToggle" aria-label="切换侧栏">☰</button>
        <a href="{{ '/' | relative_url }}" class="topbar-title">操作系统导论</a>
      </header>
      <article class="content"><div class="content-inner">{{ content }}</div></article>
      <footer class="footer">
        <p>操作系统导论（中文版）· <a href="https://github.com/HarryPotter1tech/HarryPotter1tech-github.io" target="_blank">GitHub</a></p>
      </footer>
    </div>
  </div>
  <script>
    const s=document.getElementById('sidebar'),o=document.getElementById('sidebarOverlay'),t=document.getElementById('sidebarToggle'),c=document.getElementById('sidebarClose');
    function open(){s.classList.add('open');o.classList.add('show')}
    function close(){s.classList.remove('open');o.classList.remove('show')}
    t.onclick=open;c.onclick=close;o.onclick=close;
    document.addEventListener('keydown',function(e){if(e.key==='Escape')close()});
    function filterSidebar(v){const q=v.toLowerCase().trim();document.querySelectorAll('.sidebar-link').forEach(function(l){l.style.display=q===''?'':(l.dataset.title.toLowerCase().includes(q)||l.textContent.toLowerCase().includes(q)?'':'none')});document.querySelectorAll('.sidebar-section').forEach(function(s){if(q!==''){s.style.display=Array.from(s.querySelectorAll('.sidebar-link')).some(function(l){return l.style.display!=='none'})?'':'none'}else{s.style.display=''}});if(q===''){document.querySelectorAll('.sidebar-link').forEach(function(l){l.style.display=''})}}
    document.querySelectorAll('.sidebar-link.active').forEach(function(e){e.scrollIntoView({block:'center',behavior:'smooth'})});
  </script>
</body>
</html>
